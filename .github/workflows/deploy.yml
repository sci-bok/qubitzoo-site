name: Deploy Qubit Zoo to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Nightly build at 07:00 UTC (03:00 EDT) — after daily pipeline finishes
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use repository content
        run: echo "Using checked-in content/ for this deployment."

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'


      - name: Fix publication dates
        run: python scripts/fix-dates.py

      - name: Generate sunburst data
        run: npx tsx scripts/build-sunburst-data.ts

      - name: Build Quartz
        run: npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
