name: Deploy Qubit Zoo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Use repository content
        run: echo "Using checked-in content/ for this deployment."

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Check types + formatting
        run: npm run check

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Log content sync metadata
        run: |
          if [ -f content/_meta/content-sync.json ]; then
            python -c "
          import json; m=json.loads(open('content/_meta/content-sync.json').read())
          print('Content synced at:', m.get('synced_at_utc','unknown'))
          print('Pipeline run:', m.get('source',{}).get('pipeline_run_timestamp_local','unknown'))
          "
          else
            echo "No content sync metadata found (first deploy or manual push)"
          fi

      - name: Fix publication dates
        run: python scripts/fix-dates.py

      - name: Generate sunburst data
        run: npx tsx scripts/build-sunburst-data.ts

      - name: Build Quartz
        run: npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
