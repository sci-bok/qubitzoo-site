name: Deploy Qubit Zoo to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Nightly build at 12:30 UTC (07:30 EST / 08:30 EDT) — safely after daily pipeline run.
    - cron: '30 12 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use repository content
        run: echo "Using checked-in content/ for this deployment."

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Check types + formatting
        run: npm run check

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate content freshness vs pipeline
        run: |
          python - <<'PY'
          import json
          from datetime import datetime
          from pathlib import Path
          from urllib.request import urlopen

          def parse_ts(value: str) -> datetime:
              text = str(value or "").strip()
              if text.endswith("Z"):
                  text = text[:-1] + "+00:00"
              return datetime.fromisoformat(text)

          meta_path = Path("content/_meta/content-sync.json")
          if not meta_path.exists():
              raise SystemExit("Missing content sync metadata: content/_meta/content-sync.json")

          meta = json.loads(meta_path.read_text())
          site_ts_raw = (
              meta.get("source", {}).get("pipeline_run_timestamp_utc")
              or meta.get("synced_at_utc")
          )
          if not site_ts_raw:
              raise SystemExit("content-sync metadata missing pipeline timestamp")

          url = "https://raw.githubusercontent.com/sci-bok/qubit-zoo-zettelkasten/main/data/reports/latest-run-summary.json"
          with urlopen(url, timeout=20) as resp:
              latest_summary = json.loads(resp.read().decode("utf-8"))

          pipeline_ts_raw = latest_summary.get("timestamp_utc")
          if not pipeline_ts_raw:
              raise SystemExit("latest pipeline summary missing timestamp_utc")

          site_ts = parse_ts(site_ts_raw)
          pipeline_ts = parse_ts(pipeline_ts_raw)

          if site_ts < pipeline_ts:
              raise SystemExit(
                  f"Site content is stale: site pipeline timestamp {site_ts_raw} < latest pipeline {pipeline_ts_raw}"
              )

          print("Freshness check passed:")
          print(f"- site content timestamp: {site_ts_raw}")
          print(f"- latest pipeline timestamp: {pipeline_ts_raw}")
          PY

      - name: Fix publication dates
        run: python scripts/fix-dates.py

      - name: Generate sunburst data
        run: npx tsx scripts/build-sunburst-data.ts

      - name: Build Quartz
        run: npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
